# =============================================================
# docker-compose.yml — DESPLIEGUE CON .env (turnkey)
#
#   docker compose up -d
#
# REQUIERE un archivo .env con tus valores reales (DB, JWT, R2, SMTP).
# Copia .env.example a .env y complétalo (o reutiliza tu .env existente).
#
#   postgres (carga automática de datos en el primer arranque) ─┐
#   redis                                                         ┴─► server (API :8080)
#
# - Todos los valores sensibles se toman de .env (Cloudflare R2, SMTP,
#   JWT_SECRET, credenciales de BD). Sin .env, el arranque falla a propósito.
# - La base de datos se pre-carga una sola vez con los datos del sistema
#   (usuarios, ejercicios con imágenes, rankings, historial) desde server/db/init/.
#
# Para desarrollo con código en vivo: docker compose -f docker-compose.dev.yml up -d
# Para producción tras Nginx + HTTPS:  docker compose -f docker-compose.prod.yml up -d
# =============================================================

services:

  # ── 1. Base de datos (carga automática de datos en el primer arranque) ─────
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB:       ${DB_NAME:-gym_ubb_dev}
      POSTGRES_USER:     ${DB_USER:-gym_ubb_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpassword123}
    volumes:
      - gymubb_pgdata:/var/lib/postgresql/data
      # Los .sql aquí se ejecutan SOLO la primera vez (volumen vacío) → siembra inicial
      - ./server/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-gym_ubb_user} -d ${DB_NAME:-gym_ubb_dev}"]
      interval: 5s
      timeout: 5s
      retries: 15
    restart: unless-stopped

  # ── 2. Caché / blacklist JWT / rate limiting ───────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - gymubb_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ── 3. Servidor API Dart/Shelf (binario compilado, self-contained) ─────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"       # API REST
    # Toma TODOS los valores desde .env (RUNMODE, DB, JWT, R2, SMTP, etc.).
    # Si .env no existe, docker compose falla aquí a propósito.
    env_file:
      - .env
    # Solo se fuerzan los valores de red interna del contenedor (ignoran .env),
    # para que el server siempre encuentre a postgres/redis dentro de la red docker.
    environment:
      DB_HOST:     postgres
      DB_PORT:     "5432"
      REDIS_HOST:  redis
      REDIS_PORT:  "6379"
      PORT:        "8080"
    volumes:
      - gymubb_uploads:/uploads   # Imágenes subidas localmente (fallback sin R2)
    restart: unless-stopped

# ── Volúmenes persistentes ─────────────────────────────────────────────────────
volumes:
  gymubb_pgdata:   # Datos PostgreSQL (incluye la siembra inicial del primer arranque)
  gymubb_redis:    # Datos Redis (AOF)
  gymubb_uploads:  # Imágenes subidas localmente (fallback sin R2)
