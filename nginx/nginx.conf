# =============================================================
# nginx.conf — Reverse proxy para GymUBB API
# Producción: HTTPS + HTTP→HTTPS redirect
# Para desarrollo local no se usa nginx
# =============================================================

worker_processes auto;

events {
  worker_connections 1024;
  use epoll;
  multi_accept on;
}

http {
  # Logging
  access_log /var/log/nginx/access.log combined;
  error_log  /var/log/nginx/error.log warn;

  # Performance
  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;
  gzip on;
  gzip_types application/json text/plain;

  # Rate limiting global (protección básica a nivel proxy)
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

  # Ocultar versión de nginx
  server_tokens off;

  # ── Upstream ─────────────────────────────────────────────────────────────
  upstream shelf_api {
    server server:8080;
    keepalive 32;
  }

  # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
  server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
  }

  # ── HTTPS ─────────────────────────────────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name gym.ubiobio.cl;   # Cambiar al dominio real

    # Certificados (Let's Encrypt / Certbot)
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # TLS moderno
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Tamaño máximo de body (sync con límite del servidor Shelf)
    client_max_body_size 10M;

    # ── API endpoints ──────────────────────────────────────────────────────

    # Rate limiting más estricto en endpoints de auth
    location /api/v1/auth/ {
      limit_req zone=auth burst=3 nodelay;
      limit_req_status 429;

      proxy_pass http://shelf_api/api/v1/auth/;
      include /etc/nginx/proxy_params.conf;
    }

    # API general
    location /api/ {
      limit_req zone=api burst=50 nodelay;

      proxy_pass http://shelf_api/api/;
      include /etc/nginx/proxy_params.conf;
    }

    # Health check (sin rate limit)
    location /health {
      proxy_pass http://shelf_api/health;
      include /etc/nginx/proxy_params.conf;
    }

    # Bloquear todo lo demás
    location / {
      return 404;
    }
  }
}
